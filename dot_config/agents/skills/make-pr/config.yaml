# make-pr 스킬 설정 파일
#
# PR 생성 시 repo별 기본 동작을 제어한다.
# 이 파일이 없거나 키가 비어 있으면 스킬은 default 동작(draft 생성)으로 진행한다.

# Draft 없이 ready 상태로 PR을 바로 생성할 repo 목록.
#
# 매칭 키: `gh repo view --json name --jq '.name'` 결과 (GitHub repo 이름).
# 예) origin이 `https://github.kakaocorp.com/kjk/agent-review.git` 이면 매칭 키는 `agent-review`.
#
# 여기에 등록되지 않은 repo는 모두 `--draft`로 생성되고, 사용자가 GitHub UI 또는
# `gh pr ready <num>` 로 직접 ready 상태로 전환할 수 있다.
ready_repos:
  # 사내 코드 리뷰 자동화 봇(tsukkomi[bot])이 ready PR에만 즉시 반응하도록 설계되어 있어
  # draft 단계 없이 바로 review 가능 상태로 올린다.
  - agent-review
  - santaclaude
  - piccoma-kr-guide
