# brief-morning 설정 파일 예시
# 이 파일을 복사하여 config.yaml을 만들고 머신에 맞게 수정하세요.
#
# cp config.example.yaml config.yaml

# ─────────────────────────────────────────────
# 작업 그룹 enable/disable
# ─────────────────────────────────────────────
tasks:
  on_this_day: true     # TASK GROUP A  : 이날의 기록 (과거 같은 날짜)
  calendar: true        # TASK GROUP B  : Google Calendar 이번 주 일정
  gmail: true           # TASK GROUP C  : Gmail 받은편지함 요약
  daily_note: true      # TASK GROUP E  : 어제 daily note 확인
  git_status: true      # TASK GROUP F  : Git 로컬 상태 확인
  github_pr: true       # TASK GROUP G  : GitHub PR 조회 (내 PR + 리뷰 필요)

# ─────────────────────────────────────────────
# Git 상태 확인 설정 (tasks.git_status: true 일 때만 사용)
# ─────────────────────────────────────────────
git:
  # ~/Workspace 아래에서 최근 recent_days일 내 커밋이 있는 git repo를 자동 탐색해 worktree 상태를 점검한다.
  # (명시 경로 나열 대신, 최근 작업한 프로젝트를 자동으로 골라냄)
  workspace: /Users/casper/Workspace
  recent_days: 30
  # 점검에서 제외할 repo 디렉토리명 목록
  exclude:
    - goomba-hub-review

# ─────────────────────────────────────────────
# GitHub PR 조회 설정 (tasks.github_pr: true 일 때만 사용)
# ─────────────────────────────────────────────
github:
  repos:
    - github.kakaocorp.com/kjk/goomba-hub
    - github.kakaocorp.com/kjk/flutter_epub_viewer
    - github.kakaocorp.com/kjk/pluto_grid
    - github.kakaocorp.com/kjk/flutter_ocr
